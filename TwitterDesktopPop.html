<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Pop Desktop</title>
   <link rel="stylesheet" href="TwitterDesktopPop.css">
<script src="TwitterDesktopPop.js" defer></script>

  </head>
    
  <body>
  <div class="twitter">

  <img class="twitter-frame"
       src="https://github.com/Not-A-Kitz/28th-of-August/blob/main/TwitterBGbis.png?raw=true"
       alt="">

  <div class="tweet-area">

    <img class="background"
         src="https://github.com/Not-A-Kitz/28th-of-August/blob/main/Twitter-Interaction-Pop.jpeg?raw=true"
         alt="">

    <img class="like"
         src="https://github.com/Not-A-Kitz/28th-of-August/blob/main/2Likes.jpeg?raw=true"
         alt="">

    <img class="CompleteLike"
         src="https://github.com/Not-A-Kitz/28th-of-August/blob/main/3CoeurMobile.png?raw=true"
         alt="">

    <div class="reply-trigger"></div>

    <video id="reply-video"
           src="https://github.com/Not-A-Kitz/28th-of-August/raw/refs/heads/main/TwitterPopAnswer.mp4"
           playsinline
           preload="auto">
    </video>

    <img id="reply-final"
         src="https://github.com/Not-A-Kitz/28th-of-August/blob/main/TwitterPop1.jpeg?raw=true"
         alt="">

  </div>

</div>


<div class="thread">

  <img id="new-post"
       src="https://github.com/Not-A-Kitz/28th-of-August/blob/main/Answer01Pop.jpeg?raw=true"
       alt="">

  <video id="gif"
         src="https://github.com/Not-A-Kitz/28th-of-August/raw/refs/heads/main/AnswerPopVideo.mp4"
         loop
         playsinline
         muted
         preload="auto">
  </video>

  
  <a id="new-tweets-button" href="TwitterDesktop.html">
  See new tweets
</a>
  
  <div id="secret">
  Katastrophio liked your tweet.
</div>
  
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
